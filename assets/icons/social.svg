<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101013"/>
      <stop offset="1" stop-color="#1a0608"/>
    </linearGradient>
    <linearGradient id="streak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#e10600" stop-opacity="0"/>
      <stop offset=".4"  stop-color="#e10600" stop-opacity=".55"/>
      <stop offset="1"   stop-color="#e10600" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Decorative diagonal speed streaks -->
  <g opacity=".18" transform="rotate(-8 640 360)">
    <rect x="-200" y="120" width="1700" height="6"  fill="url(#streak)"/>
    <rect x="-200" y="170" width="1700" height="3"  fill="url(#streak)"/>
    <rect x="-200" y="560" width="1700" height="4"  fill="url(#streak)"/>
    <rect x="-200" y="610" width="1700" height="2"  fill="url(#streak)"/>
  </g>

  <!-- Subtle track outline (Monaco-ish silhouette) on the right -->
  <g opacity=".10" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(820 470) scale(.55)">
    <path d="M40 80 q40 -60 110 -60 q60 0 80 40 q20 40 80 30 q60 -10 80 30 q20 50 -20 90 q-50 50 -120 50 q-100 0 -150 -40 q-50 -40 -60 -140 z"/>
  </g>

  <!-- Tag (Round) -->
  <g transform="translate(140 192)">
    <rect width="180" height="42" rx="6" fill="#e10600"/>
    <text x="90" y="29" text-anchor="middle"
          font-family="'Space Mono', ui-monospace, Menlo, Consolas, monospace"
          font-weight="700" font-size="20" fill="#ffffff" letter-spacing="3">SCHEDULE</text>
  </g>

  <!-- Wordmark -->
  <text x="140" y="372"
        font-family="'Space Mono', ui-monospace, Menlo, Consolas, monospace"
        font-weight="700" font-size="148" fill="#ffffff" letter-spacing="-4">WHEN IS</text>

  <!-- Big F1 chip -->
  <g transform="translate(140 410)">
    <rect width="320" height="160" rx="20" fill="#e10600"/>
    <text x="160" y="130" text-anchor="middle"
          font-family="'Space Mono', ui-monospace, Menlo, Consolas, monospace"
          font-weight="700" font-size="148" fill="#ffffff" letter-spacing="-6">F1</text>
  </g>

  <!-- Tagline -->
  <text x="490" y="540"
        font-family="'Space Mono', ui-monospace, Menlo, Consolas, monospace"
        font-weight="400" font-size="28" fill="#a1a1a7" letter-spacing="2">YOUR LOCAL TIME.</text>
  <text x="490" y="582"
        font-family="'Space Mono', ui-monospace, Menlo, Consolas, monospace"
        font-weight="400" font-size="28" fill="#a1a1a7" letter-spacing="2">YOUR CALENDAR.</text>

  <!-- Footer accent line -->
  <rect x="140" y="640" width="120" height="4" fill="#e10600"/>
</svg>
